<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Board Gen</title>
    <style>
      body { font: 13px system-ui, sans-serif; margin: 0; padding: 12px; background: #1b1b1f; color: #ddd; }
      h1 { font-size: 14px; margin: 0 0 10px; }
      .row { display: flex; gap: 6px; }
      input { flex: 1; padding: 6px; background: #2a2a30; color: #ddd; border: 1px solid #444; border-radius: 4px; }
      button { padding: 6px 10px; background: #2d6cdf; color: white; border: 0; border-radius: 4px; cursor: pointer; }
      button.secondary { background: #3a3a42; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      #results { margin-top: 10px; display: flex; flex-direction: column; gap: 4px; }
      .result { padding: 6px 8px; background: #23232a; border-radius: 4px; display: flex; gap: 6px; align-items: center; }
      .result .title { flex: 1; font-size: 12px; }
      .result .title a { color: #9ec7ff; text-decoration: none; }
      .result .title a:hover { text-decoration: underline; }
      .result button { font-size: 11px; padding: 4px 8px; }
      #status { margin-top: 10px; font-size: 12px; color: #9a9; white-space: pre-wrap; min-height: 1.2em; }
      .warn { color: #e8b; }
    </style>
  </head>
  <body>
    <h1>Board Gen — Talestavern search</h1>
    <form id="search-form" class="row" onsubmit="return false">
      <input id="query" type="text" placeholder="search slabs, e.g. 'crypt'" autofocus />
      <button id="search">Search</button>
    </form>
    <div id="results"></div>
    <div id="status">Enter a query and press Search. Slabs land on your cursor; click in TaleSpire to place (GM only).</div>
    <script src="symbiote.js?v=2"></script>
  </body>
</html>
